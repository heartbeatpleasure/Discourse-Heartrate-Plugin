              title: "Heartrate is disabled"
              description: "The plugin is disabled, so realtime collection is not expected to run."
            async_disabled:
              title: "Async current readings are disabled"
              description: "Persistent HypeRate streaming is enabled, but it cannot start until async current readings are enabled."
            hyperate_disabled:
              title: "HypeRate is disabled"
              description: "Persistent HypeRate streaming is enabled, but the HypeRate provider itself is disabled."
            hyperate_not_configured:
              title: "HypeRate is not configured"
              description: "Persistent streaming is requested, but the server-side HypeRate configuration is incomplete."
            collector_health_missing:
              title: "Collector health is unavailable"
              description: "Streaming is expected, but no health snapshot is available. A healthy collector refreshes this snapshot continuously and it expires after %{critical_age_seconds} seconds."
            collector_health_critical:
              title: "Collector health is too old"
              description: "The latest health snapshot is %{age_seconds} seconds old, exceeding the %{critical_age_seconds}-second critical threshold."
            collector_health_stale:
              title: "Collector health is delayed"
              description: "The latest health snapshot is %{age_seconds} seconds old. Healthy snapshots are normally newer than %{warning_age_seconds} seconds."
            stream_limit_reached:
              title: "Stream limit reached"
              description: "%{sessions} sessions are currently managed within a configured limit of %{limit}. All configured stream capacity is in use; additional eligible accounts cannot start until capacity becomes available."
            stalled_sessions:
              title: "Stalled sessions detected"
              description: "%{count} session(s) are marked stalled by the transport watchdog."
            unauthorized_sessions:
              title: "Unauthorized sessions detected"
              description: "%{count} session(s) cannot complete provider authorization. Review the server-side HypeRate configuration."
            reconnecting_sessions:
              title: "Sessions are reconnecting"
              description: "%{count} session(s) are currently reconnecting. This can be transient; refresh the page to confirm recovery."
            active_accounts_without_sessions:
              title: "Active HypeRate accounts have no sessions"
              description: "%{count} active HypeRate account(s) exist, but the collector currently reports zero managed sessions."

