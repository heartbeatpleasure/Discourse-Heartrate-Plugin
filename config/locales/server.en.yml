en:
  site_settings:
    live_metrics_enabled: "Enable the Heartrate plugin."
    live_metrics_nav_enabled: "Show a Heartrate navigation item when the theme component is installed."
    live_metrics_require_login_to_view_page: "Require login for the Heartrate page and directory API. Recommended when sharing live heart-rate data."
    live_metrics_allow_anonymous_public_view: "Allow anonymous users to view accounts marked public. Keep disabled unless you intentionally want public heart-rate visibility."
    live_metrics_viewer_groups: "Groups that may open the Heartrate page and view shared live heart-rate data. Leave empty to allow all logged-in users."
    live_metrics_viewer_groups_title: "Groups allowed to view Heartrate"
    live_metrics_allowed_sharer_groups: "Groups that may connect providers and share their own live heart-rate data. Users also need view access. Leave empty to allow all logged-in users."
    live_metrics_allowed_sharer_groups_title: "Groups allowed to share heartrate data"
    live_metrics_allowed_visibility_options: "Visibility choices shown to users for their shared heart-rate data. Only me (private) is always available as the privacy-safe fallback. Add specific_users, logged_in, public, and/or staff when those choices should be selectable."
    live_metrics_allowed_visibility_options_title: "Visibility choices users may select"
    live_metrics_directory_enabled: "Enable the Heartrate overview/directory."
    live_metrics_directory_limit: "Maximum number of accounts shown in the Heartrate directory."
    live_metrics_poll_interval_seconds: "Frontend refresh interval, in seconds, for the live preview, Heartrate overview, profiles and user cards. This controls browser requests to Discourse, not provider refreshes."
    live_metrics_provider_refresh_interval_seconds: "Target start-to-start interval, in seconds, for background provider refreshes. Pulsoid uses this interval. HypeRate uses it only while persistent HypeRate streaming is disabled."
    live_metrics_async_current_readings_enabled: "Use temporary latest-only Redis state and non-blocking provider acquisition. Pulsoid refreshes in the background; HypeRate can use persistent streaming. When enabled, live web APIs never wait directly for a provider."
    live_metrics_api_cache_seconds: "Legacy short cache for synchronous provider requests. Used only while async current readings are disabled and retained temporarily for rollback."
    live_metrics_live_threshold_seconds: "Maximum age, in seconds, for a metric to be shown as Live. HypeRate commonly delivers readings about 10 seconds apart, so 20 seconds is recommended to absorb normal provider jitter without UI flicker."
    live_metrics_stale_threshold_seconds: "Maximum age, in seconds, before a metric is shown as having no recent signal. Temporary Redis state expires automatically after this threshold plus a short grace period, with a hard maximum retention of 120 seconds."
    live_metrics_statistics_enabled: "Request and display provider statistics where supported. Requires an additional Pulsoid OAuth scope."
    live_metrics_pulsoid_enabled: "Enable Pulsoid as a provider for Heartrate."
    live_metrics_pulsoid_client_id: "Pulsoid OAuth client ID."
    live_metrics_pulsoid_client_secret: "Pulsoid OAuth client secret. Stored as a masked Discourse secret setting; keep it server-side and rotate it through the Pulsoid provider dashboard when required."
    live_metrics_pulsoid_authorize_url: "Pulsoid OAuth authorize URL. Only https:// URLs on pulsoid.net are accepted."
    live_metrics_pulsoid_token_url: "Pulsoid OAuth token URL. Only https:// URLs on pulsoid.net are accepted."
    live_metrics_pulsoid_revoke_url: "Pulsoid OAuth revoke URL. Only https:// URLs on pulsoid.net are accepted."
    live_metrics_pulsoid_latest_url: "Pulsoid latest heart-rate API URL. Only https:// URLs on pulsoid.net are accepted."
    live_metrics_pulsoid_statistics_url: "Pulsoid statistics API URL. Only https:// URLs on pulsoid.net are accepted."
    live_metrics_pulsoid_profile_url: "Pulsoid profile API URL. Only https:// URLs on pulsoid.net are accepted."
    live_metrics_pulsoid_redirect_uri_override: "Optional exact Pulsoid OAuth redirect URI override. Leave blank to use /live-metrics/auth/pulsoid/callback on this site."
    live_metrics_hyperate_enabled: "Enable HypeRate as a provider for Heartrate."
    live_metrics_hyperate_api_key: "HypeRate API key. Stored as a masked Discourse secret setting; keep it server-side, rotate it through HypeRate when required, and let users enter only their device ID."
    live_metrics_hyperate_ws_url: "HypeRate WebSocket URL. HTTPS-equivalent security is enforced: only wss:// on hyperate.io is accepted. Use :deviceId as a placeholder; the official endpoint is wss://app.hyperate.io/ws/:deviceId."
    live_metrics_hyperate_streaming_enabled: "Keep one HypeRate WebSocket open per active HypeRate account and write every received heart-rate event directly to temporary Redis state. This removes HypeRate work from Sidekiq. Enable first on the test environment; Pulsoid remains on its existing background refresh path."
    live_metrics_hyperate_max_streams: "Maximum number of simultaneous HypeRate streaming connections per Discourse site. The default of 100 supports the planned 50 concurrent users while leaving a safety margin. Additional active accounts wait until capacity is available."
    live_metrics_hyperate_stream_stall_timeout_seconds: "Maximum number of seconds a connected HypeRate stream may go without any WebSocket frame or heartbeat response before the transport is treated as stalled and reconnected. Heart-rate silence alone does not trigger a reconnect. The recommended value is 45 seconds."
    live_metrics_hyperate_read_timeout_seconds: "Legacy HypeRate single-read timeout, in seconds. Used only while persistent HypeRate streaming is disabled or for rollback."

  dashboard:
    problem:
      live_metrics_operational_health: "Heartrate has persistent operational problems:%{issues}<a href='%{base_path}/admin/plugins/live-metrics-health'>Open Heartrate Health</a> or <a href='%{base_path}/admin/plugins/live-metrics-logs'>review recent Heartrate logs</a>."

  live_metrics:
    admin_alerts:
      collector_health_stale: "The HypeRate collector has stopped reporting healthy status for longer than the allowed health window."
      stream_limit_reached: "The HypeRate stream capacity is full (%{sessions} of %{limit} streams in use)."
      repeated_authorization_failures: "%{count} provider authorization failures were recorded within %{window_minutes} minutes."
      repeated_stream_reconnects: "%{count} HypeRate reconnect problems were recorded within %{window_minutes} minutes (alert threshold %{threshold})."
